# Legacy workflow kept for OpenEvolve core tests.
# Optimizer-loop tests are handled by ci.yml
name: OpenEvolve Core Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openevolve-tests:
    name: OpenEvolve core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run OpenEvolve core tests
        env:
          OPENAI_API_KEY: test
        run: |
          python -m pytest \
            tests/test_database.py \
            tests/test_api.py \
            tests/test_cli.py \
            tests/test_utils.py \
            tests/test_metric_parser.py \
            tests/test_workspace_manager.py \
            -v --tb=short -q \
            --timeout=60 \
            --ignore=tests/integration \
            --ignore=tests/performance \
            -x
