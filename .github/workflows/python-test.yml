# LoopBench engine tests — best-effort, non-blocking
name: LoopBench Core Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  loopbench-tests:
    name: LoopBench core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout hypothesis

      - name: Run LoopBench metric parser tests
        env:
          OPENAI_API_KEY: test
        run: |
          python -m pytest tests/test_metric_parser.py \
            -v --tb=short --timeout=60 -p no:warnings
