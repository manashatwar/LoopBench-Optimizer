# Deploy the static dashboard in docs/ to GitHub Pages.
# Deterministic replacement for GitHub's auto-generated pages-build-deployment.
name: Deploy Dashboard to Pages

on:
  push:
    branches: [main]
    paths:
      # Only the files actually served by the site — editing architecture
      # markdown (which GitHub renders directly) should not trigger a redeploy.
      - "docs/index.html"
      - "docs/data.json"
      - "docs/blog.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Cancel a superseded run so rapid pushes don't pile
# up and fail against the single-deployment github-pages environment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
