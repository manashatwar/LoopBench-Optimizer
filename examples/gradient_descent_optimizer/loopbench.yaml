# LoopBench example — Gradient descent: Python loops → NumPy vectorization.
# Requires numpy (auto-installed in the sandbox). Run either way:
#   loopbench run --target . --target-file examples/gradient_descent_optimizer/initial_program.py --metric latency --pip numpy
#   loopbench run --config examples/gradient_descent_optimizer/loopbench.yaml

target:
  file: initial_program.py
  evaluator: test_gradient_descent.py

sandbox:
  command: "pytest test_gradient_descent.py -v -s -q"
  pip: ["numpy"]

metric:
  name: "combined_score"
  threshold: 0.90

constraints:
  max_iterations: 6
