# ============================================================================
# Configuration Best Practices
# ============================================================================
#
# 1. Start with defaults, then tune based on needs
# 2. Enable caching in development (10-100x speedup)
# 3. Adjust token_budget based on LLM context window:
#    - GPT-3.5 (4k): 500-1000 tokens
#    - GPT-4 (8k): 1000-1500 tokens
#    - GPT-4-32k: 3000-5000 tokens
#    - Claude-100k: 5000-10000 tokens
# 4. Use aggressive filtering for large repos (>100k LOC)
# 5. Disable cache in CI/CD if disk space is limited
# 6. Increase max_workers on multi-core machines
# 7. Monitor token usage and adjust accordingly
# 8. Test configuration changes with demo script first
