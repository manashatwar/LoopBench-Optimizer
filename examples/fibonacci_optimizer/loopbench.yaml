# LoopBench example — Fibonacci: naive recursion → memoized/iterative.
# Run either way:
#   loopbench run --target . --target-file examples/fibonacci_optimizer/initial_program.py --metric latency
#   loopbench run --config examples/fibonacci_optimizer/loopbench.yaml

target:
  file: initial_program.py        # the code to optimize
  evaluator: test_fibonacci.py    # the test (correctness gate + LOOPBENCH_SPEED_MS)

sandbox:
  command: "pytest test_fibonacci.py -v -s -q"

metric:
  name: "combined_score"
  threshold: 0.95

constraints:
  max_iterations: 5
