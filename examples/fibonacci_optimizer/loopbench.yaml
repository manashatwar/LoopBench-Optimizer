# LoopBench Hello World — Fibonacci Optimizer
# This is the loopbench.yaml for running via `loopbench run`.
#
# Usage:
#   export GEMINI_API_KEY=your_key_here
#   loopbench run --config examples/fibonacci_optimizer/loopbench.yaml
#   loopbench check --config examples/fibonacci_optimizer/loopbench.yaml

# ── LoopBench fields ──────────────────────────────────────────────────────────
target:
  program: initial_program.py
  evaluator: evaluator.py

sandbox:
  use_docker: false              # flip to true to run tests inside Docker
  command: "pytest test_fibonacci.py -v -s -q --tb=short"
  network_off: true
  readonly_mount: true

metric:
  name: "combined_score"
  threshold: 0.95                # stop when fib is fast AND all tests pass
  direction: "maximize"

constraints:
  max_iterations: 20
  max_token_cost_usd: 3.0

# ── OpenEvolve passthrough ────────────────────────────────────────────────────
max_iterations: 5
checkpoint_interval: 1
log_level: "INFO"
diff_based_evolution: true
max_code_length: 5000

llm:
  models:
    - name: "gemini-2.5-flash"
      weight: 1.0
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  api_key: "${GEMINI_API_KEY}"
  temperature: 0.7
  max_tokens: 2048
  timeout: 90
  retries: 5
  retry_delay: 65

prompt:
  system_message: >
    You are an expert Python performance engineer. Rewrite the fibonacci()
    function inside the EVOLVE-BLOCK to maximize speed while keeping all
    pytest tests green. Consider: lru_cache, iterative DP, or closed-form.
    Do NOT change run_fibonacci(n). Negative inputs must return 0.
  num_top_programs: 2
  num_diverse_programs: 1

database:
  population_size: 20
  archive_size: 10
  num_islands: 1
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7

evaluator:
  timeout: 60
  cascade_evaluation: false
  parallel_evaluations: 1
