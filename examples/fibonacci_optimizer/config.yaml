# LoopBench Hello World: Fibonacci Optimizer
# FREE TIER config — respects Gemini free quota limits:
#   - gemini-2.0-flash-lite: 30 RPM, 1500 RPD
#   - parallel_evaluations: 1  (no concurrent calls)
#   - retry_delay: 65s          (outlasts the 45-60s retry window)
#
# Run:
#   export GEMINI_API_KEY=your_key_here
#   python openevolve-run.py \
#       examples/fibonacci_optimizer/initial_program.py \
#       examples/fibonacci_optimizer/evaluator.py \
#       --config examples/fibonacci_optimizer/config.yaml

max_iterations: 5
checkpoint_interval: 1
log_level: "INFO"
diff_based_evolution: true
max_code_length: 3000

# ── LLM (Free Tier Safe) ──────────────────────────────────────────────────────
llm:
  models:
    - name: "gemini-2.5-flash"
      weight: 1.0
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  api_key: "${GEMINI_API_KEY}"
  temperature: 0.7
  max_tokens: 2048
  timeout: 90
  retries: 5
  retry_delay: 65    # Free tier suggests ~45-60s retry window

# ── Prompt ────────────────────────────────────────────────────────────────────
prompt:
  system_message: >
    You are an expert Python performance engineer. Your task is to rewrite the
    fibonacci() function inside the EVOLVE-BLOCK to be as fast as possible.

    Strategies to consider (in order of effectiveness):
      1. functools.lru_cache decorator (simplest, ~1000x speedup)
      2. Iterative dynamic programming (no recursion overhead)
      3. Matrix exponentiation (O(log n) — overkill but valid)

    Rules you MUST follow:
      - Do NOT change the function signature: fibonacci(n: int) -> int
      - Do NOT change or remove run_fibonacci(n) — it is outside the block
      - Do NOT add import statements outside the EVOLVE-BLOCK markers
      - fibonacci(-1) and fibonacci(-5) MUST return 0
      - All 13 pytest tests must pass (correctness is the hard gate)

  num_top_programs: 2
  num_diverse_programs: 1

# ── Database / Population ─────────────────────────────────────────────────────
database:
  population_size: 20
  archive_size: 10
  num_islands: 1
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  exploration_ratio: 0.2
  migration_interval: 10
  migration_rate: 0.1

# ── Evaluator ─────────────────────────────────────────────────────────────────
evaluator:
  timeout: 60
  cascade_evaluation: false   # our evaluator has no evaluate_stage1
  parallel_evaluations: 1    # FREE TIER: sequential only — no concurrent API calls
