# LoopBench example — JSON parser: concatenation bottleneck → list + join.
# Run either way:
#   loopbench run --target . --target-file examples/json_parser_optimizer/initial_program.py --metric latency
#   loopbench run --config examples/json_parser_optimizer/loopbench.yaml

target:
  file: initial_program.py
  evaluator: test_json_parser.py

sandbox:
  command: "pytest test_json_parser.py -v -s -q"

metric:
  name: "combined_score"
  threshold: 0.90

constraints:
  max_iterations: 5
