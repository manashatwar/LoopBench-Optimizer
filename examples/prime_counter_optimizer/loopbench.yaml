# LoopBench example — Prime counter: trial division → Sieve of Eratosthenes.
# Run either way:
#   loopbench run --target . --target-file examples/prime_counter_optimizer/initial_program.py --metric latency
#   loopbench run --config examples/prime_counter_optimizer/loopbench.yaml

target:
  file: initial_program.py
  evaluator: test_prime_counter.py

sandbox:
  command: "pytest test_prime_counter.py -v -s -q"

metric:
  name: "combined_score"
  threshold: 0.95

constraints:
  max_iterations: 5
