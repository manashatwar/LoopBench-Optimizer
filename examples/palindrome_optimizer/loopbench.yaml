# LoopBench example — Longest palindrome (CodeChef PRINCESS): O(n³) → O(n²).
# Run either way:
#   loopbench run --target . --target-file examples/palindrome_optimizer/initial_program.py --metric latency
#   loopbench run --config examples/palindrome_optimizer/loopbench.yaml

target:
  file: initial_program.py
  evaluator: test_palindrome.py

sandbox:
  command: "pytest test_palindrome.py -v -s -q"

metric:
  name: "combined_score"
  threshold: 0.90

constraints:
  max_iterations: 6
