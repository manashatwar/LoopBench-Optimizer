# LoopBench configuration template
#
# Generated by `loopbench init --name <project>`. Fill in the two paths under
# `target`, then run:
#
#   loopbench check --config <this-file>.yaml   # validate + dry-run the test
#   loopbench run   --config <this-file>.yaml   # optimize
#
# Optimizing someone else's repo? Use `loopbench init --job my_job` instead — it
# scaffolds a job folder (loopbench.yaml + test_target.py) that points at an
# external repo without editing it. See docs/defining-benchmarks.md.

# ── Target: what to optimize ──────────────────────────────────────────────────
# Paths are relative to this file. The test file IS the evaluator — there is no
# separate evaluator.py. It must assert correctness and print a speed marker
# line `LOOPBENCH_SPEED_MS=<number>` (see docs/defining-benchmarks.md, Option A).
target:
  file: initial_program.py          # the file to optimize
  evaluator: test_my_project.py     # your pytest suite (correctness + speed marker)

# ── Sandbox: how tests run ────────────────────────────────────────────────────
sandbox:
  command: "pytest test_my_project.py -v -s -q"   # any runner; pytest by default
  # pip: ["numpy"]                                  # extra packages to install (else auto-detected)

# ── Metric: what to optimize and when to stop ─────────────────────────────────
metric:
  name: "combined_score"    # a key your test/parser produces (default combined_score)
  threshold: 0.95           # stop early once the best score reaches this
  direction: "maximize"

# ── Search: how the loop explores (optional) ──────────────────────────────────
# `auto` (default) starts greedy and escalates on a plateau — no config needed.
# Override to greedy | beam | random_restart for full control.
search:
  strategy: auto

# ── Constraints: compute / cost budgets ───────────────────────────────────────
constraints:
  max_iterations: 20
  # max_tokens_total: 200000        # stop after this many total LLM tokens
  # max_token_cost_usd: 0.25        # stop after this estimated spend (needs pricing below)
  # max_runtime_seconds: 600        # wall-clock deadline for the whole run
  # usd_per_1k_prompt: 0.00059      # your provider's input price per 1k tokens
  # usd_per_1k_completion: 0.00079  # output price per 1k tokens
